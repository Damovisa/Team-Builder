<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚽ FC26 Team Builder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="header-logo">
      <span class="logo-icon">⚽</span>
      <span class="logo-text">FC26 Team Builder</span>
    </div>
  </header>

  <!-- ===== MAIN LAYOUT ===== -->
  <main class="app-main">

    <!-- ── Search Panel ── -->
    <aside class="search-panel">
      <div class="panel-header">
        <h2>Find Players</h2>
        <div class="search-type-toggle">
          <button class="tab-btn active" data-type="name">By Name</button>
          <button class="tab-btn" data-type="team">By Team</button>
          <button class="tab-btn" data-type="rank">Top Rated</button>
        </div>
      </div>

      <!-- By Name -->
      <div class="search-bar-container" id="paneByName">
        <div class="search-row">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Full name, e.g. Erling Haaland"
            maxlength="60"
          />
          <button id="searchBtn" class="btn-primary">🔍</button>
        </div>
        <div class="search-hint">Partial names work — e.g. "Salah" or "Haaland"</div>
      </div>

      <!-- By Team -->
      <div class="search-bar-container hidden" id="paneByTeam">
        <div class="search-row">
          <input
            type="text"
            id="teamInput"
            class="search-input"
            placeholder="e.g. Liverpool, Real Madrid"
            maxlength="60"
          />
          <button id="teamSearchBtn" class="btn-primary">🔍</button>
        </div>
        <div class="search-hint">Use the club's official name</div>
      </div>

      <!-- Top Rated -->
      <div class="search-bar-container hidden" id="paneByRank">
        <div class="search-row">
          <label class="rank-label" for="rankFrom">Ranks</label>
          <input type="number" id="rankFrom" class="rank-input" value="1"  min="1" max="500" />
          <span class="rank-sep">–</span>
          <input type="number" id="rankTo"   class="rank-input" value="20" min="1" max="500" />
          <button id="rankSearchBtn" class="btn-primary">Load</button>
        </div>
        <div class="search-hint">Single API call — results sorted by rank</div>
      </div>

      <div class="search-status" id="searchStatus"></div>

      <!-- Slot-selection hint injected here by JS -->

      <div class="search-results" id="searchResults">
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <p>Search for players to add to your team</p>
        </div>
      </div>
    </aside>

    <!-- ── Team / Pitch Panel ── -->
    <section class="team-panel">
      <div class="team-header">
        <h2>My Team</h2>
        <div class="team-controls">
          <label for="formationSelect">Formation:</label>
          <select id="formationSelect" class="formation-select">
            <option value="4-3-3">4-3-3</option>
            <option value="4-4-2">4-4-2</option>
            <option value="3-5-2">3-5-2</option>
            <option value="4-2-3-1">4-2-3-1</option>
            <option value="5-3-2">5-3-2</option>
          </select>
          <button id="clearTeamBtn" class="btn-danger">Clear</button>
        </div>
      </div>

      <div class="pitch-wrapper">
        <div class="pitch" id="pitch">
          <!-- Pitch markings -->
          <div class="pitch-markings" aria-hidden="true">
            <div class="halfway-line"></div>
            <div class="center-circle"></div>
            <div class="center-dot"></div>
            <div class="penalty-area penalty-top"></div>
            <div class="penalty-area penalty-bottom"></div>
            <div class="goal-area goal-top"></div>
            <div class="goal-area goal-bottom"></div>
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
          </div>
          <!-- Player slots rendered by JS -->
          <div class="slots-container" id="slotsContainer"></div>
        </div>
      </div>

      <!-- Team stats bar -->
      <div class="team-stats-bar">
        <div class="team-stat">
          <span class="tstat-label">Players</span>
          <span class="tstat-value" id="statPlayers">0/11</span>
        </div>
        <div class="team-stat">
          <span class="tstat-label">OVR</span>
          <span class="tstat-value" id="statRating">—</span>
        </div>
        <div class="team-stat">
          <span class="tstat-label">PAC</span>
          <span class="tstat-value" id="statPace">—</span>
        </div>
        <div class="team-stat">
          <span class="tstat-label">SHO</span>
          <span class="tstat-value" id="statShooting">—</span>
        </div>
        <div class="team-stat">
          <span class="tstat-label">PAS</span>
          <span class="tstat-value" id="statPassing">—</span>
        </div>
        <div class="team-stat">
          <span class="tstat-label">DRI</span>
          <span class="tstat-value" id="statDribbling">—</span>
        </div>
        <div class="team-stat">
          <span class="tstat-label">DEF</span>
          <span class="tstat-value" id="statDefending">—</span>
        </div>
        <div class="team-stat">
          <span class="tstat-label">PHY</span>
          <span class="tstat-value" id="statPhysicality">—</span>
        </div>
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
